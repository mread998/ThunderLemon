apiVersion: v1
kind: ConfigMap
metadata:
  name: sabnzbd-init-scripts
  namespace: media
data:
  10-host-whitelist.sh: |
    #!/bin/bash
    INI=/config/sabnzbd.ini
    HOSTNAME="sabnzbd.thundertest.org"
    if [ -f "$INI" ]; then
      if grep -q "^host_whitelist" "$INI"; then
        sed -i "s/^host_whitelist = .*/host_whitelist = ${HOSTNAME},/" "$INI"
      else
        sed -i "/^\[misc\]/a host_whitelist = ${HOSTNAME}," "$INI"
      fi
    fi
