# Downloads NFS Storage
---
# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: media-downloads
#   namespace: media
# spec:
#   accessModes:
#     - ReadWriteMany
#   storageClassName: nfs-dev
#   resources:
#     requests:
#       storage: 500Gi

apiVersion: v1
kind: PersistentVolume
metadata:
  name: media-downloads-pv
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-static
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: 10.11.11.48
    path: /srv/vault/downloads

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: media-downloads
  namespace: media
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-static
  volumeName: media-downloads-pv
  resources:
    requests:
      storage: 500Gi

