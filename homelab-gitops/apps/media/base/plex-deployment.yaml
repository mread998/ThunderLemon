apiVersion: apps/v1
kind: Deployment
metadata:
  name: plex
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plex
  template:
    metadata:
      labels:
        app: plex
    spec:
      containers:
        - name: plex
          image: ghcr.io/linuxserver/plex:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 32400
              name: http
          envFrom:
            - configMapRef:
                name: plex-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
          volumeMounts:
            - name: plex-config
              mountPath: /config
            - name: media-tv
              mountPath: /tv
            - name: media-movies
              mountPath: /movies
      volumes:
        - name: plex-config
          persistentVolumeClaim:
            claimName: plex-config
        - name: media-tv
          persistentVolumeClaim:
            claimName: media-tv
        - name: media-movies
          persistentVolumeClaim:
            claimName: media-movies
