apiVersion: apps/v1
kind: Deployment
metadata:
  name: sabnzbd
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sabnzbd
  template:
    metadata:
      labels:
        app: sabnzbd
    spec:
      containers:
        - name: sabnzbd
          image: ghcr.io/linuxserver/sabnzbd:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: sabnzbd-config
            - secretRef:
                name: sabnzbd-credentials
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          volumeMounts:
            - name: sabnzbd-config
              mountPath: /config
            - name: media-downloads
              mountPath: /downloads
            - name: media-tv
              mountPath: /tv
            - name: media-movies
              mountPath: /movies
            - name: media-music
              mountPath: /audio
      volumes:
        - name: sabnzbd-config
          persistentVolumeClaim:
            claimName: sabnzbd-config
        - name: media-downloads
          persistentVolumeClaim:
            claimName: media-downloads
        - name: media-tv
          persistentVolumeClaim:
            claimName: media-tv
        - name: media-movies
          persistentVolumeClaim:
            claimName: media-movies
        - name: media-music
          persistentVolumeClaim:
            claimName: media-music
