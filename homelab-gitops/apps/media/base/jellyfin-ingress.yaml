apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jellyfin
  namespace: media
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - jellyfin.thundertest.org
      secretName: jellyfin-tls
  rules:
    - host: jellyfin.thundertest.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: jellyfin
                port:
                  number: 80
