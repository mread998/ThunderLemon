# Wiki.js application data (uploads, assets)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wikijs-data
  namespace: docs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-rwx
  resources:
    requests:
      storage: 10Gi

# Paperless-NGX: document consumption drop folder
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-consume
  namespace: docs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-rwx
  resources:
    requests:
      storage: 10Gi

# Paperless-NGX: processed document storage
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-data
  namespace: docs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-rwx
  resources:
    requests:
      storage: 100Gi

# Paperless-NGX: media files (document thumbnails, originals)
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: paperless-media
  namespace: docs
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-rwx
  resources:
    requests:
      storage: 100Gi

# Paperless-NGX: export directory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
