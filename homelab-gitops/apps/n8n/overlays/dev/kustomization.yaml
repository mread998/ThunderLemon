apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: n8n-dev

resources:
  - ../../base
  - namespace.yaml

patches:
  # Remove the base Namespace (n8n) so it doesn't conflict with the prod app
  - patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: n8n
  # Fix SealedSecret template namespace so it matches n8n-dev
  - patch: |
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        name: n8n-secrets
        namespace: n8n-dev
      spec:
        encryptedData:
          N8N_BASIC_AUTH_ACTIVE: 
          N8N_BASIC_AUTH_PASSWORD: 
          N8N_BASIC_AUTH_USER: 
          N8N_ENCRYPTION_KEY: 
          POSTGRES_DB: 
          POSTGRES_PASSWORD: 
          POSTGRES_USER: 
        template:
          metadata:
            name: n8n-secrets
            namespace: n8n-dev
          type: Opaque
    target:
      kind: SealedSecret
      name: n8n-secrets
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: n8n
  - path: certificate-patch.yaml
    target:
      kind: Certificate
      name: n8n-tls
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: n8n
      spec:
        template:
          spec:
            containers:
              - name: n8n
                env:
                  - name: N8N_HOST
                    value: "n8n-dev.thundertest.org"
                  - name: WEBHOOK_URL
                    value: "https://n8n-dev.thundertest.org/"
    target:
      kind: Deployment
      name: n8n
