apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: awx-dev

resources:
  - ../../base

patches:
  - path: namespace-patch.yaml
    target:
      kind: Namespace
      name: awx
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: awx
  - path: certificate-patch.yaml
    target:
      kind: Certificate
      name: awx-tls
  # SealedSecrets are namespace-scoped — base secrets (sealed for 'awx') cannot
  # be reused in 'awx-dev'. These patches replace the encrypted values with
  # dev-namespace sealed equivalents.
  # Fill in the REPLACE_WITH_SEALED_VALUE placeholders (see secrets.template.yaml).
  - path: awx-admin-patch.yaml
    target:
      kind: SealedSecret
      name: awx-admin-password
  - path: awx-secret-key-patch.yaml
    target:
      kind: SealedSecret
      name: awx-secret-key
  - path: awx-postgres-config-patch.yaml
    target:
      kind: SealedSecret
      name: awx-postgres-configuration
  - path: postgres-storage-patch.yaml
    target:
      kind: StatefulSet
      name: postgres
