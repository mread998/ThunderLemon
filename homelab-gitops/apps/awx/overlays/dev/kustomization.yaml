apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: awx-dev

resources:
  - ../../base

patches:
  - path: namespace-patch.yaml
    target:
      kind: Namespace
      name: awx
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: awx
  - path: certificate-patch.yaml
    target:
      kind: Certificate
      name: awx-tls
