#        awx-admin-patch.yaml
#        awx-secret-key-patch.yaml
#        awx-postgres-config-patch.yaml
#
# NOTE: kubeseal must be run against the cluster that holds the sealing key.
#   Fetch the cert with:
#     kubeseal --fetch-cert > pub-cert.pem
