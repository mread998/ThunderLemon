  #   python3 -c "import secrets; print(secrets.token_hex(32))"
  secret_key: "changeme"
---
apiVersion: v1
kind: Secret
metadata:
  name: awx-postgres-configuration
  namespace: awx-dev
type: Opaque
stringData:
  host: "postgres.awx-dev.svc.cluster.local"
  port: "5432"
  database: "awx"
  username: "awx"
  password: "changeme"
