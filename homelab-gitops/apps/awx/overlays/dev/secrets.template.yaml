#   2. Run kubeseal for each secret (or split into 3 files and loop):
#
#      kubeseal --namespace awx-dev --name awx-admin-password \
#        --secret-file <(cat secrets.template.yaml | yq 'select(.metadata.name == "awx-admin-password")') \
#        --format yaml > awx-admin-sealed-dev.yaml
#
