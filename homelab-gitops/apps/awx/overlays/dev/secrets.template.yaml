#
---
apiVersion: v1
kind: Secret
metadata:
  name: awx-admin-password
  namespace: awx-dev
type: Opaque
stringData:
  password: "changeme"
---
apiVersion: v1
kind: Secret
metadata:
  name: awx-secret-key
  namespace: awx-dev
type: Opaque
stringData:
