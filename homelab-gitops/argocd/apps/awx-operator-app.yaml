apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: awx-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://ansible-community.github.io/awx-operator-helm/
    chart: awx-operator
    targetRevision: 3.2.0
    helm:
      values: |
        watchNamespaces:
          - awx
          - awx-dev
        # Keep defaults for now
        # (We manage the AWX instance separately in the next app)
  destination:
    server: https://kubernetes.default.svc
    namespace: awx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Important for operators:
      - ServerSideApply=true
      # If you see CRD conflicts:
      # - Replace=true
