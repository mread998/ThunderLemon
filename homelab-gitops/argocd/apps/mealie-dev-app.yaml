apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mealie-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/mread998/ThunderLemon.git
    targetRevision: main
    path: homelab-gitops/apps/mealie/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: mealie-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true