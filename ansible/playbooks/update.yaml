---
# Playbook to perform an OS package update/upgrade
# Works in AWX; adjusts for Debian/Ubuntu and RHEL/CentOS families
- name: Update operating system packages
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_facts.os_family == 'Debian'

    - name: Upgrade all apt packages (Debian/Ubuntu)
      ansible.builtin.apt:
        upgrade: dist
      when: ansible_facts.os_family == 'Debian'

    - name: Upgrade all packages (RHEL family)
      ansible.builtin.package:
        name: "*"
        state: latest
      when: ansible_facts.os_family == 'RedHat'

